<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Responder Login — Al-Furqan Tourism</title>
<meta name="description" content="Sign in to the Al-Furqan Tourism responder dashboard." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal:        #2ECFB2;
    --teal-dark:   #1aad96;
    --teal-darker: #0f9480;
    --teal-light:  #e8faf7;
    --teal-mid:    #c0f0e8;
    --navy:        #1B3D8C;
    --navy-light:  #2a52b5;
    --navy-faint:  #eef1fa;

    --white:       #ffffff;
    --gray-50:     #f8f9fb;
    --gray-100:    #f0f2f5;
    --gray-200:    #e4e7ed;
    --gray-400:    #9aa1b1;
    --gray-600:    #5a6275;
    --gray-800:    #2c3244;

    --error:       #e53e3e;
    --error-bg:    #fff5f5;

    --shadow-card: 0 8px 40px rgba(27,61,140,0.10), 0 2px 8px rgba(27,61,140,0.06);
    --shadow-btn:  0 4px 14px rgba(46,207,178,0.35);

    --font: 'Inter', system-ui, -apple-system, sans-serif;
    --radius: 12px;
    --transition: 220ms cubic-bezier(0.4,0,0.2,1);
  }

  html, body {
    height: 100%;
    font-family: var(--font);
    background: var(--white);
    color: var(--gray-800);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ═══════════════════════════════════════════════
     LEFT PANEL — Brand / Logo
  ═══════════════════════════════════════════════ */
  .brand-panel {
    width: 52%;
    background: linear-gradient(150deg, var(--teal) 0%, var(--teal-dark) 50%, #0e8a78 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 48px;
    position: relative;
    overflow: hidden;
    animation: panelSlideIn 0.6s cubic-bezier(0.4,0,0.2,1) both;
  }

  @keyframes panelSlideIn {
    from { transform: translateX(-40px); opacity: 0; }
    to   { transform: translateX(0);     opacity: 1; }
  }

  /* Decorative circles */
  .brand-panel::before {
    content: '';
    position: absolute;
    width: 480px; height: 480px;
    border: 80px solid rgba(255,255,255,0.07);
    border-radius: 50%;
    top: -120px; right: -120px;
    pointer-events: none;
  }

  .brand-panel::after {
    content: '';
    position: absolute;
    width: 340px; height: 340px;
    border: 60px solid rgba(255,255,255,0.06);
    border-radius: 50%;
    bottom: -80px; left: -80px;
    pointer-events: none;
  }

  .brand-logo-wrap {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 16px 60px rgba(0,0,0,0.18), 0 0 0 12px rgba(255,255,255,0.15);
    overflow: hidden;
    animation: logoReveal 0.7s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
    z-index: 1;
    flex-shrink: 0;
  }

  @keyframes logoReveal {
    from { transform: scale(0.75); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  .brand-logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 10px;
  }

  .brand-tagline {
    margin-top: 36px;
    text-align: center;
    z-index: 1;
    animation: fadeUp 0.5s 0.4s ease-out both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .brand-tagline h2 {
    color: var(--white);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }

  .brand-tagline p {
    color: rgba(255,255,255,0.82);
    font-size: 14px;
    margin-top: 8px;
    font-weight: 400;
    line-height: 1.6;
  }

  .brand-dots {
    display: flex;
    gap: 10px;
    margin-top: 32px;
    z-index: 1;
    align-items: center;
  }

  /* Dots are static by default; animate only when `.loading` is present. */
  .brand-dots span {
    display: block;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
  }

  .brand-dots.loading span {
    animation: dotWave 1.6s ease-in-out infinite;
  }

  /* Three dots each a different size & delay to create a wave */
  .brand-dots span:nth-child(1) {
    width: 10px; height: 10px;
    animation-delay: 0s;
  }
  .brand-dots span:nth-child(2) {
    width: 10px; height: 10px;
    animation-delay: 0.22s;
  }
  .brand-dots span:nth-child(3) {
    width: 10px; height: 10px;
    animation-delay: 0.44s;
  }

  @keyframes dotWave {
    0%, 100% {
      transform: translateY(0) scale(1);
      background: rgba(255,255,255,0.35);
    }
    40% {
      transform: translateY(-8px) scale(1.2);
      background: rgba(255,255,255,0.95);
    }
    60% {
      transform: translateY(-4px) scale(1.05);
      background: rgba(255,255,255,0.7);
    }
  }

  /* ═══════════════════════════════════════════════
     RIGHT PANEL — Login Form
  ═══════════════════════════════════════════════ */
  .form-panel {
    flex: 1;
    background: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 48px;
    position: relative;
    overflow-y: auto;
    animation: formSlideIn 0.6s 0.1s cubic-bezier(0.4,0,0.2,1) both;
  }

  @keyframes formSlideIn {
    from { transform: translateX(30px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  .form-inner {
    width: 100%;
    max-width: 360px;
  }

  /* Breadcrumb header */
  .form-header {
    margin-bottom: 36px;
  }

  .form-header .welcome {
    font-size: 26px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: -0.02em;
    line-height: 1.2;
  }

  .form-header .sub {
    font-size: 14px;
    color: var(--gray-400);
    margin-top: 6px;
    font-weight: 400;
  }

  .form-header .accent-bar {
    width: 40px;
    height: 3px;
    background: var(--teal);
    border-radius: 2px;
    margin-top: 14px;
  }

  /* ── Fields ────────────────────────────────── */
  .field {
    margin-bottom: 20px;
    animation: fieldIn 0.4s ease-out both;
  }

  .field:nth-child(1) { animation-delay: 0.2s; }
  .field:nth-child(2) { animation-delay: 0.28s; }

  @keyframes fieldIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-600);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 7px;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gray-400);
    transition: color var(--transition);
    pointer-events: none;
    display: flex;
  }

  .input-wrap:focus-within .input-icon { color: var(--teal-dark); }

  .field input {
    width: 100%;
    padding: 13px 14px 13px 44px;
    background: var(--gray-50);
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    color: var(--gray-800);
    font-family: var(--font);
    font-size: 14px;
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    caret-color: var(--teal);
  }

  .field input::placeholder { color: var(--gray-400); }

  .field input:focus {
    border-color: var(--teal);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(46,207,178,0.15);
  }

  .field input.error-field {
    border-color: var(--error);
    background: var(--error-bg);
    box-shadow: 0 0 0 3px rgba(229,62,62,0.1);
  }

  /* ── Error ─────────────────────────────────── */
  #error {
    font-size: 13px;
    color: var(--error);
    min-height: 18px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 500;
  }

  #error svg { flex-shrink: 0; }
  #error.shake { animation: shake 0.35s ease-out; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-6px); }
    40%      { transform: translateX(5px); }
    60%      { transform: translateX(-4px); }
    80%      { transform: translateX(3px); }
  }

  /* ── Submit Button ─────────────────────────── */
  #login-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--teal), var(--teal-dark));
    border: none;
    border-radius: var(--radius);
    color: var(--white);
    font-family: var(--font);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: opacity var(--transition), transform var(--transition), box-shadow var(--transition);
    box-shadow: var(--shadow-btn);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    animation: fieldIn 0.4s 0.36s ease-out both;
  }

  #login-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(46,207,178,0.45);
  }

  #login-btn:active:not(:disabled) {
    transform: translateY(0);
    box-shadow: var(--shadow-btn);
  }

  #login-btn:disabled { opacity: 0.65; cursor: not-allowed; }

  /* Spinner */
  .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.35);
    border-top-color: var(--white);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
    flex-shrink: 0;
  }

  #login-btn.loading .spinner { display: block; }
  #login-btn.loading .btn-text { opacity: 0.8; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Footer ────────────────────────────────── */
  .form-footer {
    margin-top: 32px;
    text-align: center;
    font-size: 12px;
    color: var(--gray-400);
    line-height: 1.6;
  }

  .form-footer strong { color: var(--navy); font-weight: 600; }

  /* ═══════════════════════════════════════════════
     RESPONSIVE
  ═══════════════════════════════════════════════ */
  @media (max-width: 1024px) {
    body { flex-direction: column; overflow: auto; }
    .brand-panel { width: 100%; padding: 32px 24px 24px; min-height: 240px; }
    .brand-logo-wrap { width: 140px; height: 140px; }
    .brand-tagline h2 { font-size: 20px; }
    .brand-tagline p { font-size: 13px; }
    .form-panel { padding: 32px 24px; }
  }

  @media (max-width: 768px) {
    body { flex-direction: column; overflow: auto; }
    .brand-panel { width: 100%; padding: 24px 20px 20px; min-height: 200px; }
    .brand-logo-wrap { width: 120px; height: 120px; }
    .brand-tagline { margin-top: 20px; }
    .brand-tagline h2 { font-size: 18px; }
    .brand-tagline p { font-size: 12px; line-height: 1.5; }
    .brand-dots { margin-top: 20px; }
    .form-panel { padding: 24px 20px; }
    .form-inner { max-width: 100%; }
    .form-header { margin-bottom: 24px; }
    .form-header .welcome { font-size: 22px; }
    .form-header .sub { font-size: 13px; }
    .field { margin-bottom: 16px; }
    .field label { font-size: 11px; }
    .field input { font-size: 14px; padding: 11px 12px 11px 40px; }
    #login-btn { font-size: 14px; padding: 12px; }
    .form-footer { margin-top: 24px; font-size: 11px; }
  }

  @media (max-width: 480px) {
    body { overflow: auto; }
    .brand-panel { width: 100%; padding: 16px 16px 12px; min-height: 160px; }
    .brand-panel::before { width: 300px; height: 300px; border-width: 50px; top: -100px; right: -100px; }
    .brand-panel::after { width: 200px; height: 200px; border-width: 40px; bottom: -60px; left: -60px; }
    .brand-logo-wrap { width: 100px; height: 100px; box-shadow: 0 12px 40px rgba(0,0,0,0.15), 0 0 0 8px rgba(255,255,255,0.15); }
    .brand-tagline { margin-top: 16px; }
    .brand-tagline h2 { font-size: 16px; }
    .brand-tagline p { font-size: 11px; }
    .brand-dots { margin-top: 16px; gap: 8px; }
    .brand-dots span { width: 8px; height: 8px; }
    .form-panel { padding: 20px 16px; }
    .form-inner { max-width: 100%; }
    .form-header { margin-bottom: 20px; }
    .form-header .welcome { font-size: 20px; }
    .form-header .sub { font-size: 12px; }
    .field { margin-bottom: 14px; }
    .field label { font-size: 11px; margin-bottom: 6px; }
    .input-wrap { }
    .input-icon { left: 12px; }
    .field input { font-size: 16px; padding: 10px 12px 10px 38px; border-radius: 10px; }
    #login-btn { font-size: 13px; padding: 11px; border-radius: 10px; }
    #login-btn svg { width: 14px; height: 14px; }
    .form-footer { margin-top: 20px; font-size: 11px; line-height: 1.5; }
  }
</style>
</head>
<body>

  <!-- ═══════ LEFT: BRAND PANEL ═══════ -->
  <div class="brand-panel">
    <div class="brand-logo-wrap">
      <img src="/logo.jpeg" alt="Al-Furqan Tourism & Travel Logo" />
    </div>

    <div class="brand-tagline">
      <h2>Responder Dashboard</h2>
      <p>Manage customer inquiries and<br/>provide exceptional travel support.</p>
    </div>

    <div class="brand-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- ═══════ RIGHT: FORM PANEL ═══════ -->
  <div class="form-panel">
    <div class="form-inner">

      <div class="form-header">
        <div class="welcome">Welcome back</div>
        <div class="sub">Sign in to continue to the dashboard</div>
        <div class="accent-bar"></div>
      </div>

      <div id="error" role="alert"></div>

      <div class="field">
        <label for="username">Username</label>
        <div class="input-wrap">
          <span class="input-icon">
            <!-- Person icon -->
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username" />
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <!-- Lock icon -->
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
        </div>
      </div>

      <button id="login-btn" onclick="login()">
        <div class="spinner"></div>
        <span class="btn-text">Sign In</span>
        <!-- Arrow icon -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>

      <div class="form-footer">
        <strong>Al-Furqan Tourism &amp; Travel</strong><br/>
        Authorized personnel only
      </div>

    </div>
  </div>

<script>
document.getElementById('username').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
document.getElementById('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });

async function login() {
  const username  = document.getElementById('username').value.trim();
  const password  = document.getElementById('password').value;
  const btn       = document.getElementById('login-btn');
  const errorEl   = document.getElementById('error');
  const dots      = document.querySelector('.brand-dots');

  // Clear errors
  errorEl.innerHTML = '';
  errorEl.classList.remove('shake');
  document.getElementById('username').classList.remove('error-field');
  document.getElementById('password').classList.remove('error-field');

  if (!username || !password) {
    showError('Please fill in all fields.');
    return;
  }

  btn.disabled = true;
  btn.classList.add('loading');
  if (dots) dots.classList.add('loading');

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });

    if (res.ok) {
      btn.querySelector('.btn-text').textContent = 'Redirecting…';
      window.location.href = '/dashboard.html';
    } else {
      const body = await res.json().catch(() => ({}));
      showError(body.error || 'Invalid username or password.');
      document.getElementById('username').classList.add('error-field');
      document.getElementById('password').classList.add('error-field');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    if (dots) dots.classList.remove('loading');
  }
}

function showError(msg) {
  const errorEl = document.getElementById('error');
  errorEl.innerHTML = `
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    ${msg}`;
  errorEl.classList.remove('shake');
  void errorEl.offsetWidth;
  errorEl.classList.add('shake');
}
</script>
</body>
</html>
